<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心理陪伴 - 玄象</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 40px);
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      color: white;
      text-align: center;
    }
    .header h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }
    .header p {
      font-size: 14px;
      opacity: 0.9;
    }
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #f7f7f7;
    }
    .message {
      margin-bottom: 15px;
      display: flex;
      align-items: flex-start;
    }
    .message.user {
      flex-direction: row-reverse;
    }
    .message-content {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.5;
      font-size: 15px;
    }
    .message.assistant .message-content {
      background: white;
      color: #333;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .message.user .message-content {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      margin: 0 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .message.assistant .message-avatar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .message.user .message-avatar {
      background: #e0e0e0;
    }
    .input-area {
      padding: 20px;
      background: white;
      border-top: 1px solid #e0e0e0;
    }
    .input-group {
      display: flex;
      gap: 10px;
    }
    #messageInput {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 25px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.3s;
    }
    #messageInput:focus {
      border-color: #667eea;
    }
    #sendBtn {
      padding: 12px 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 15px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #sendBtn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    #sendBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .typing-indicator {
      display: none;
      padding: 12px 16px;
      background: white;
      border-radius: 18px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      max-width: 70px;
    }
    .typing-indicator.active {
      display: block;
    }
    .typing-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #667eea;
      margin: 0 2px;
      animation: typing 1.4s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .back-btn:hover {
      background: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="back-btn" onclick="window.history.back()">←</button>
      <h1>💗 心理陪伴</h1>
      <p>温暖倾听，真诚陪伴</p>
    </div>
    
    <div class="chat-area" id="chatArea">
      <div class="message assistant">
        <div class="message-avatar">💗</div>
        <div class="message-content">
          你好呀～我是你的心理陪伴师。无论你遇到什么困扰、情绪波动，或是想找人聊聊天，我都在这里陪伴你。请放心倾诉，我会认真倾听、理解你的感受。💫
        </div>
      </div>
    </div>
    
    <div class="input-area">
      <div class="input-group">
        <input type="text" id="messageInput" placeholder="说说你的感受..." />
        <button id="sendBtn" onclick="sendMessage()">发送</button>
      </div>
    </div>
  </div>

  <script>
    const chatArea = document.getElementById('chatArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const history = [];

    // 回车发送
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message) return;

      // 禁用输入
      messageInput.disabled = true;
      sendBtn.disabled = true;

      // 添加用户消息
      addMessage('user', message);
      messageInput.value = '';

      // 显示输入中指示器
      const typingIndicator = document.createElement('div');
      typingIndicator.className = 'message assistant';
      typingIndicator.innerHTML = `
        <div class="message-avatar">💗</div>
        <div class="typing-indicator active">
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
          <span class="typing-dot"></span>
        </div>
      `;
      chatArea.appendChild(typingIndicator);
      scrollToBottom();

      try {
        const response = await fetch('/api/psychology/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: message,
            history: history.slice(-5), // 只保留最近5轮对话
            userName: localStorage.getItem('userName') || '匿名'
          })
        });

        const data = await response.json();
        
        // 移除输入中指示器
        typingIndicator.remove();

        if (data.success) {
          addMessage('assistant', data.result);
          
          // 保存对话历史
          history.push({
            user: message,
            assistant: data.result
          });
        } else {
          addMessage('assistant', '抱歉，我现在有点忙不过来... 请稍后再试试吧 🥺');
        }
      } catch (error) {
        typingIndicator.remove();
        addMessage('assistant', '网络连接出了点问题，请检查网络后重试 💔');
      }

      // 恢复输入
      messageInput.disabled = false;
      sendBtn.disabled = false;
      messageInput.focus();
    }

    function addMessage(role, content) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;
      
      const avatar = role === 'assistant' ? '💗' : '👤';
      
      messageDiv.innerHTML = `
        <div class="message-avatar">${avatar}</div>
        <div class="message-content">${escapeHtml(content)}</div>
      `;
      
      chatArea.appendChild(messageDiv);
      scrollToBottom();
    }

    function scrollToBottom() {
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML.replace(/\n/g, '<br>');
    }

    // 自动聚焦输入框
    messageInput.focus();
  </script>
</body>
</html>
